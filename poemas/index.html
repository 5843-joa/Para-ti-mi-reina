<h1>Poemas para ti 💖</h1>

<div class="card">
<p>
Eres mi sol en días grises,<br>
mi calma en la tempestad,<br>
tu sonrisa es lo que dice<br>
que todo va a estar bien.
</p>
</div>

<div class="card">
<p>
Contigo todo es mejor,<br>
como un sueño sin final,<br>
eres magia en mi vida,<br>
mi razón para amar.
</p>
</div>
